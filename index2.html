    <script>
    const bgImages = ['photo/art1.png', 'photo/art2.png', 'photo/art3.png'];
    let currentImgIndex = 0;

    function changeBodyBackground() {
        currentImgIndex = (currentImgIndex + 1) % bgImages.length;
        const nextTargetImage = bgImages[currentImgIndex];
        
        document.body.style.backgroundImage = linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('${nextTargetImage}');
    }
    setInterval(changeBodyBackground, 5000);
</script>
